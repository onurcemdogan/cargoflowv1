# CargoFlow — Nginx reverse proxy (Ubuntu, self-hosted).
# Kurulum: /etc/nginx/sites-available/cargoflow → sites-enabled'a symlink.
# HTTPS sertifikası certbot ile alınır (aşağıdaki 443 bloğunu certbot kendisi
# de ekleyebilir; bu dosya certbot --nginx sonrası referans yapılandırmadır).
#
# ÖNEMLİ: Uygulama ve API AYNI ORIGIN'den servis edilir (Node hem /api hem
# dist/index.html'i sunar). Bu yüzden CORS'a gerek yoktur ve HttpOnly+Secure
# +SameSite=Lax cookie'ler sorunsuz çalışır. Frontend zaten göreli /api
# yollarını kullanır; domain değişince frontend'de yapılandırma GEREKMEZ.

# HTTP → HTTPS yönlendirme (certbot doğrulaması hariç).
server {
    listen 80;
    listen [::]:80;
    server_name ornek-domain.com www.ornek-domain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ornek-domain.com www.ornek-domain.com;

    # certbot tarafından doldurulur:
    ssl_certificate     /etc/letsencrypt/live/ornek-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ornek-domain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Güvenlik başlıkları (HSTS'i yalnız HTTPS tam çalıştıktan sonra açın).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Etiket/ZPL ve sipariş senkron istekleri için yeterli gövde boyutu.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;

        # Gerçek istemci IP'si + şema: uygulamada TRUST_PROXY=1 ile okunur
        # (login rate-limit'inin IP bazlı çalışması için ZORUNLU).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Trendyol/Sürat senkronları uzun sürebilir.
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Cookie'lere dokunma (HttpOnly/Secure/SameSite uygulamadan gelir).
        proxy_pass_request_headers on;
    }
}
