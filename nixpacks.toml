# Railway/Nixpacks build yapılandırması.
# NODE_ENV=production runtime'da geçerlidir; ancak build aşamasında TypeScript
# ve Vite (devDependencies) GEREKLİDİR. install fazı --include=dev ile bunları
# kurar. install ve build YALNIZ birer kez çalışır (railway.json'da buildCommand
# yoktur; çift npm ci / EBUSY sorunu bu sayede oluşmaz). package-lock.json korunur.

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]
